version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: brainsync-postgres
    environment:
      POSTGRES_USER: brainsync
      POSTGRES_PASSWORD: brainsync_pass
      POSTGRES_DB: brainsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brainsync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: brainsync-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainsync-backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainsync-celery
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      APP_ENV: development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - qdrant
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brainsync-frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  default:
    name: brainsync-network
